name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload artifact to (for manual runs)"
        required: true

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run tests
        run: >-
          xcodebuild test
          -project "slideshow-creator.xcodeproj"
          -scheme "slideshow-creator"
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO

      - name: Build release app (unsigned)
        run: >-
          xcodebuild build
          -project "slideshow-creator.xcodeproj"
          -scheme "slideshow-creator"
          -configuration Release
          -destination 'platform=macOS'
          -derivedDataPath "build/DerivedData"
          CODE_SIGNING_ALLOWED=NO

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package app zip
        env:
          TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/slideshow-creator.app"
          ZIP_NAME="slideshow-creator-${TAG}-macos-unsigned.zip"

          test -d "$APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release_tag.outputs.tag }}
        run: gh release upload "$TAG" "$ZIP_NAME" --clobber
